# -----------------------------------------------------------------------------
# Stage 1 option B: Build with options, baseImage = your image (kairosify) + push
# Stage 2: Generate ISO
# -----------------------------------------------------------------------------
apiVersion: build.kairos.io/v1alpha2
kind: OSArtifact
metadata:
  name: kairosify-custom-base
  namespace: default
spec:
  image:
    buildOptions:
      version: v1.0.0
      baseImage: ghcr.io/kairos-io/hadron:v0.0.1
      model: generic
      kubernetesDistro: k0s
      kubernetesVersion: "v1.28.0"
    buildImage:
      registry: quay.io
      repository: kairos/hadron
      tag: v1.0.0
    push: false

  artifacts:
    arch: amd64
    iso: false
    cloudConfigRef:
      name: cloud-config
      key: userdata

  exporters: []
