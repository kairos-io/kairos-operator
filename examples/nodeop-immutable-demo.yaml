# Minimal NodeOp example.
#
# The NodeOp spec is immutable after creation. To run another operation, create
# a new NodeOp (e.g. with the same manifest and generateName).
#
# Create a one-off operation (each run creates a new NodeOp with a unique name):
#   kubectl create -f examples/nodeop-immutable-demo.yaml
#
# Reuse this manifest: run "kubectl create -f ..." as many times as you like;
# each create gets a new name. Do not use "kubectl apply" for re-runs, or the
# server will reject the update (spec is immutable).
#
# To test immutability: after creating, try "kubectl edit nodeop <name>" and
# change spec.command (or any spec field); the update will be rejected.
apiVersion: operator.kairos.io/v1alpha1
kind: NodeOp
metadata:
  generateName: nodeop-demo-
  namespace: default
spec:
  command: ["sh", "-c", "echo done && exit 0"]
